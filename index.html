<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureDev</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            background-color: black;
            color: white;
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 24px;
            -webkit-text-stroke: 1px purple;
        }
        .spinner {
            position: relative;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        .triangle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: purple;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            top: 50%;
            left: 50%;
            transform-origin: 50% 50%;
        }
        .triangle:nth-child(1) {
            transform: translate(-50%, -50%) rotate(0deg) translateY(-30px);
        }
        .triangle:nth-child(2) {
            transform: translate(-50%, -50%) rotate(120deg) translateY(-30px);
        }
        .triangle:nth-child(3) {
            transform: translate(-50%, -50%) rotate(240deg) translateY(-30px);
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #main {
            display: none;
            margin: 20px;
        }
        h1 {
            color: white;
            -webkit-text-stroke: 1px purple;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner">
            <div class="triangle"></div>
            <div class="triangle"></div>
            <div class="triangle"></div>
        </div>
        <div>Loading...</div>
    </div>
    <div id="main">
        <h1>FutureDev</h1>
        <p>This is a portfolio showcasing my credibility to create, and produce websites, projects, and more.</p>
        <!-- Add more content here as the project grows -->
    </div>
    <script>
        window.onload = function() {
            setTimeout(function() {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main').style.display = 'block';
            }, 5000);
        };
    </script>
</body>
</html></content>
