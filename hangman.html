<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hangman Game</title>
    <style>
        .hangman-container {
            background: transparent;
            padding: 20px;
            border-radius: 10px;
            max-width: 600px;
            margin: 20px auto;
        }
        .hangman-display {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .hangman-figure {
            width: 200px;
            height: 250px;
            border-left: 4px solid purple;
            border-bottom: 4px solid purple;
            position: relative;
            background: transparent;
        }
        .hangman-figure::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 4px;
            background: purple;
            top: 0;
            left: 0;
        }
        .hangman-figure::after {
            content: '';
            position: absolute;
            width: 4px;
            height: 30px;
            background: purple;
            top: 4px;
            left: 96px;
        }
        .head {
            width: 30px;
            height: 30px;
            border: 4px solid purple;
            border-radius: 50%;
            position: absolute;
            top: 34px;
            left: 83px;
            display: none;
        }
        .head.show {
            display: block;
        }
        .body {
            width: 4px;
            height: 50px;
            background: purple;
            position: absolute;
            top: 67px;
            left: 97px;
            display: none;
        }
        .body.show {
            display: block;
        }
        .left-arm {
            width: 35px;
            height: 4px;
            background: purple;
            position: absolute;
            top: 80px;
            left: 62px;
            display: none;
        }
        .left-arm.show {
            display: block;
        }
        .right-arm {
            width: 35px;
            height: 4px;
            background: purple;
            position: absolute;
            top: 80px;
            left: 102px;
            display: none;
        }
        .right-arm.show {
            display: block;
        }
        .left-leg {
            width: 35px;
            height: 4px;
            background: purple;
            position: absolute;
            top: 120px;
            left: 65px;
            display: none;
            transform: rotate(-30deg);
            transform-origin: left center;
        }
        .left-leg.show {
            display: block;
        }
        .right-leg {
            width: 35px;
            height: 4px;
            background: purple;
            position: absolute;
            top: 120px;
            left: 98px;
            display: none;
            transform: rotate(30deg);
            transform-origin: right center;
        }
        .right-leg.show {
            display: block;
        }
        .game-info {
            text-align: center;
            color: white;
        }
        .word-display {
            font-size: 32px;
            letter-spacing: 10px;
            font-weight: bold;
            color: purple;
            margin: 20px 0;
            font-family: monospace;
            -webkit-text-stroke: 1px purple;
            white-space: nowrap;
        }
        .word-hint {
            font-size: 18px;
            letter-spacing: 0.5px;
            font-weight: 600;
            color: white;
            -webkit-text-stroke: 0px transparent;
            margin-top: 8px;
            display: block;
            opacity: 0.95;
        }
        .guesses-info {
            color: #ccc;
            margin: 10px 0;
        }
        .wrong-letters {
            color: #ff6b6b;
            margin: 10px 0;
            min-height: 20px;
        }
        .letter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            justify-content: center;
            margin: 20px 0;
        }
        .letter-btn {
            background: transparent;
            border: 2px solid purple;
            color: white;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
            font-size: 12px;
        }
        .letter-btn:hover:not(:disabled) {
            background: purple;
            transform: scale(1.1);
        }
        .letter-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        .game-over {
            text-align: center;
            padding: 10px;
            margin: 10px 0;
            border: 2px solid purple;
            display: none;
        }
        .game-over.show {
            display: block;
        }
        .game-over.win {
            background: rgba(76, 175, 80, 0.1);
        }
        .game-over.lose {
            background: rgba(255, 86, 86, 0.1);
        }
        .game-over h2 {
            color: white;
            -webkit-text-stroke: 1px purple;
            margin: 0;
        }
        .game-over.win h2 {
            color: #4CAF50;
        }
        .game-over.lose h2 {
            color: #FF5656;
        }
        .reset-btn {
            background: transparent;
            border: 2px solid purple;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
        }
        .reset-btn:hover {
            background: purple;
        }
        .hint-btn {
            background: transparent;
            border: 2px solid purple;
            color: white;
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        .hint-btn:hover:not(:disabled) {
            background: purple;
        }
        .hint-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <div class="hangman-container">
        <div class="hangman-display">
            <div class="hangman-figure">
                <div class="head"></div>
                <div class="body"></div>
                <div class="left-arm"></div>
                <div class="right-arm"></div>
                <div class="left-leg"></div>
                <div class="right-leg"></div>
            </div>
            <div class="game-info">
                <div class="word-display" id="wordDisplay"></div>
            <div class="word-hint" id="wordHint"></div>
                <div class="guesses-info">Guesses remaining: <span id="guessesRemaining">6</span></div>
                <div class="wrong-letters">Wrong guesses: <span id="wrongLetters"></span></div>
            </div>
        </div>
        
        <div class="letter-buttons" id="letterButtons"></div>
        
        <button class="hint-btn" onclick="giveHint()">Hint</button>
        
        <div class="game-over" id="gameOver">
            <h2 id="gameOverMessage"></h2>
            <p id="wordReveal"></p>
            <button class="reset-btn" onclick="initGame()">Play Again</button>
        </div>
    </div>

    <script>
        const words = [
            { word: 'JAVASCRIPT', hint: 'A programming language used for web development' },
            { word: 'HANGMAN', hint: 'A word-guessing game' },
            { word: 'PROGRAMMING', hint: 'The process of writing computer code' },
            { word: 'COMPUTER', hint: 'An electronic device that processes data' },
            { word: 'WEBSITE', hint: 'A collection of web pages on the internet' },
            { word: 'DEVELOPER', hint: 'A person who creates software' },
            { word: 'CODE', hint: 'Instructions written in a programming language' },
            { word: 'FUNCTION', hint: 'A block of code that performs a specific task' },
            { word: 'DATABASE', hint: 'A structured set of data' },
            { word: 'ALGORITHM', hint: 'A set of rules to solve a problem' },
            { word: 'VARIABLE', hint: 'A storage location with a name' },
            { word: 'BROWSER', hint: 'Software to access the internet' },
            { word: 'NETWORK', hint: 'A group of interconnected computers' },
            { word: 'SERVER', hint: 'A computer that provides services to other computers' },
            { word: 'CLIENT', hint: 'A computer that requests services from a server' }
        ];

        let word = '';
        let currentHint = '';
        let guessedLetters = [];
        let wrongGuesses = [];
        let gameOver = false;
        let won = false;
        let hintUsed = false;
        const maxWrongGuesses = 6;

        function initGame() {
            const wordObj = words[Math.floor(Math.random() * words.length)];
            word = wordObj.word;
            currentHint = wordObj.hint;
            guessedLetters = [];
            wrongGuesses = [];
            gameOver = false;
            won = false;
            hintUsed = false;

            // Reset hangman figure
            document.querySelectorAll('.head, .body, .left-arm, .right-arm, .left-leg, .right-leg')
                .forEach(el => el.classList.remove('show'));

            // Reset game over display
            document.getElementById('gameOver').classList.remove('show', 'win', 'lose');

            // Reset hint text
            document.getElementById('wordHint').textContent = '';

            // Enable hint button
            document.querySelector('.hint-btn').disabled = false;

            // Create letter buttons
            createLetterButtons();
            updateDisplay();
        }

        function createLetterButtons() {
            const container = document.getElementById('letterButtons');
            container.innerHTML = '';
            for (let i = 65; i <= 90; i++) {
                const letter = String.fromCharCode(i);
                const btn = document.createElement('button');
                btn.textContent = letter;
                btn.className = 'letter-btn';
                btn.setAttribute('data-letter', letter);
                btn.onclick = () => guessLetter(letter, btn);
                container.appendChild(btn);
            }
        }

        function guessLetter(letter, btn) {
            if (gameOver || guessedLetters.includes(letter)) return;

            guessedLetters.push(letter);
            btn.disabled = true;

            if (!word.includes(letter)) {
                wrongGuesses.push(letter);
                showBodyPart();
                
                if (wrongGuesses.length === maxWrongGuesses) {
                    endGame(false);
                }
            } else {
                if (isWordComplete()) {
                    endGame(true);
                }
            }

            updateDisplay();
        }

        function showBodyPart() {
            const parts = ['head', 'body', 'left-arm', 'right-arm', 'left-leg', 'right-leg'];
            if (wrongGuesses.length <= parts.length) {
                document.querySelector('.' + parts[wrongGuesses.length - 1]).classList.add('show');
            }
        }

        function isWordComplete() {
            return word.split('').every(letter => guessedLetters.includes(letter));
        }

        function updateDisplay() {
            const letters = word.split('').map(letter => 
                guessedLetters.includes(letter) ? letter : '_'
            ).join(' ');

            let html = `<span class="word-letters">${letters}</span>`;
            if (hintUsed) {
                html += `<span class="word-hint">Hint: ${currentHint}</span>`;
            }

            document.getElementById('wordDisplay').innerHTML = html;
            document.getElementById('guessesRemaining').textContent = maxWrongGuesses - wrongGuesses.length;
            document.getElementById('wrongLetters').textContent = wrongGuesses.join(', ') || 'None';
        }

        function giveHint() {
            if (hintUsed || gameOver) return;

            hintUsed = true;
            document.querySelector('.hint-btn').disabled = true;
            document.getElementById('wordHint').textContent = 'Hint: ' + currentHint;
            updateDisplay();
        }

        function endGame(won) {
            gameOver = true;
            const gameOverDiv = document.getElementById('gameOver');
            gameOverDiv.classList.add('show', won ? 'win' : 'lose');

            if (won) {
                document.getElementById('gameOverMessage').textContent = '🎉 YOU WON! 🎉';
                document.getElementById('wordReveal').textContent = `The word was: ${word}`;
            } else {
                document.getElementById('gameOverMessage').textContent = '😢 GAME OVER 😢';
                document.getElementById('wordReveal').textContent = `The word was: ${word}`;
            }

            // Disable all buttons
            document.querySelectorAll('.letter-btn').forEach(btn => btn.disabled = true);
        }

        // Initialize game on load
        initGame();
    </script>
</body>
</html>
